<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFeed • Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex justify-between">
            <h1 class="text-4xl font-bold">House of Woof</h1>
            <div>
                <button onclick="seedTestData()" class="bg-emerald-600 px-5 py-2 rounded-2xl">Seed Test Dogs</button>
                <button onclick="refreshFromGingr()" class="bg-zinc-700 px-5 py-2 rounded-2xl">Refresh</button>
            </div>
        </div>
        <div class="mt-6">
            <h2>Currently Checked In</h2>
            <div id="dogs" class="grid grid-cols-3 gap-4"></div>
        </div>
    </div>
    <script>
        function seedTestData() {
            const container = document.getElementById('dogs');
            container.innerHTML = `
                <div class="bg-zinc-800 p-4 rounded-3xl">
                    <div class="font-bold">Annie (Davis)</div>
                    <div class="text-amber-400">2 cups Feenys Finest...</div>
                    <div class="grid grid-cols-2 gap-2 mt-3">
                        <button class="py-3 bg-emerald-600 text-white rounded-xl">All</button>
                        <button class="py-3 bg-zinc-700 rounded-xl">Half</button>
                        <button class="py-3 bg-zinc-700 rounded-xl">Some</button>
                        <button class="py-3 bg-zinc-700 rounded-xl">None</button>
                    </div>
                    <div class="flex items-center mt-3">
                        <input type="checkbox" checked class="w-5 h-5"> <span class="ml-2">Fresh Food?</span>
                    </div>
                </div>
                <div class="bg-zinc-800 p-4 rounded-3xl">Aspen card with same 2x2 + checkbox</div>
            `;
            alert('✅ Full 2x2 buttons + Fresh checkbox now visible!');
        }
        window.onload = seedTestData;
    </script>
</body>
</html>
