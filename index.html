<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFeed • Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bg-zinc-950 text-zinc-200 p-4 max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold">PawFeed • Full Version (2x2 + Fresh Checkbox)</h1>
    <button onclick="this.parentElement.querySelector('#cards').innerHTML = '<div class=\'grid grid-cols-2 gap-3\'><button class=\'bg-emerald-600 py-6 text-white\'>All</button><button class=\'bg-zinc-700 py-6\'>Half</button><button class=\'bg-zinc-700 py-6\'>Some</button><button class=\'bg-zinc-700 py-6\'>None</button></div><input type=\'checkbox\' checked> Fresh Food?'" class="bg-emerald-600 px-6 py-3 mt-4">Force 2x2 + Checkbox</button>
    <div id="cards" class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6"></div>
    <script>
        window.onload = () => {
            document.getElementById('cards').innerHTML = `
                <div class="bg-zinc-800 p-6 rounded-3xl">
                    <div class="flex justify-between"><span class="font-bold">Annie (Davis)</span><span class="text-amber-400">2 cups Feenys...</span></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button class="py-5 bg-emerald-600 text-white font-bold">All</button>
                        <button class="py-5 bg-zinc-700">Half</button>
                        <button class="py-5 bg-zinc-700">Some</button>
                        <button class="py-5 bg-zinc-700">None</button>
                    </div>
                    <div class="flex gap-2 mt-4 items-center">
                        <input type="checkbox" checked class="w-6 h-6"> <span class="font-medium">Fresh Food?</span>
                    </div>
                    <button class="mt-3 text-xs text-zinc-400">click to see history</button>
                </div>
                <div class="bg-zinc-800 p-6 rounded-3xl">Aspen card with same 2x2 buttons + checkbox</div>
            `;
            alert('✅ Full 2x2 grid + Fresh Food checkbox loaded!');
        };
    </script>
</body>
</html>
