<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFeed • Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="relative">
                <div onclick="toggleFacilityDropdown()" class="flex items-center gap-x-2 cursor-pointer">
                    <h1 id="facility-title" class="text-4xl font-bold tracking-tight">House of Woof</h1>
                    <i class="fa-solid fa-chevron-down text-xl text-emerald-400"></i>
                </div>
                
                <div id="facility-dropdown" class="hidden absolute mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-2xl shadow-xl z-50">
                    <div onclick="switchLocation('House of Woof')" class="px-4 py-3 hover:bg-zinc-800 rounded-t-2xl cursor-pointer flex items-center gap-x-2">
                        <i class="fa-solid fa-home text-emerald-400"></i> <span>House of Woof</span>
                    </div>
                    <div onclick="switchLocation('Don Doggos')" class="px-4 py-3 hover:bg-zinc-800 rounded-b-2xl cursor-pointer flex items-center gap-x-2">
                        <i class="fa-solid fa-home text-emerald-400"></i> <span>Don Doggos</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-x-2">
                <button onclick="exportCSV()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-download"></i>
                    <span>Export</span>
                </button>
                <button onclick="refreshFromGingr()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-sync"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </div>

        <!-- Date + Meal Period -->
        <div class="mb-6 flex items-end gap-x-4">
            <div>
                <div class="text-sm text-zinc-400 mb-1 px-1">DATE</div>
                <input type="date" id="log-date" value="" class="bg-emerald-900/30 border border-emerald-600 text-emerald-300 rounded-2xl px-4 py-2 text-sm font-medium">
            </div>
            <div class="flex-1">
                <div class="text-sm text-zinc-400 mb-1 px-1">MEAL PERIOD</div>
                <div class="grid grid-cols-3 gap-2" id="meal-selector"></div>
            </div>
        </div>

        <!-- Currently Checked In -->
        <div class="mb-8">
            <h2 class="text-2xl font-semibold mb-4">Currently Checked In</h2>
            <div id="current-dogs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- All Dogs -->
        <div>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold">All Dogs</h2>
                <input id="search-input" type="text" placeholder="Search dogs..." oninput="renderAllDogs()" class="bg-zinc-900 border border-zinc-700 px-4 py-2.5 rounded-2xl text-sm w-72">
            </div>
            <div id="all-dogs-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="log-modal" onclick="if (event.target.id === 'log-modal') closeLogModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6 border border-zinc-700">
            
            <div class="flex justify-between items-center mb-5">
                <div>
                    <div id="modal-dog-name" class="text-2xl font-bold"></div>
                    <div id="modal-dog-breed" class="text-emerald-400"></div>
                </div>
                <button onclick="closeLogModal()" class="text-3xl text-zinc-400 hover:text-white">&times;</button>
            </div>

            <div class="space-y-5">
                <!-- Amount Selection - 2x2 -->
                <div>
                    <div class="text-sm text-zinc-400 mb-2">How much did they eat?</div>
                    <div class="flex gap-4">
                        <!-- 2x2 Grid -->
                        <div class="flex-1">
                            <div class="grid grid-cols-2 gap-2" id="quick-amount-buttons">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                        
                        <!-- Fresh Food on the right -->
                        <div class="flex flex-col justify-center min-w-[90px]">
                            <div class="text-sm text-zinc-300 mb-1">Ate Fresh?</div>
                            <input type="checkbox" id="fresh-food-toggle" class="w-7 h-7 accent-teal-600">
                        </div>
                    </div>
                </div>

                <textarea id="log-notes" rows="2" placeholder="Notes..." class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-3 text-sm"></textarea>
            </div>

            <button onclick="saveQuickLog()" class="mt-6 w-full py-4 bg-emerald-600 rounded-2xl font-bold text-lg">Save Log</button>
        </div>
    </div>

    <script>
        const GINGR_CONFIG = {
            "House of Woof": { subdomain: "houseofwoof", key: "d85f17396d2e976ac3de5fe774a3c58d" },
            "Don Doggos": { subdomain: "dondoggos", key: "0a444b85e60d67d335d7e937b4b2202f" }
        };

        let dogs = [];
        let currentLocation = "House of Woof";
        let currentMealPeriod = "Breakfast";

        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }

        function loadData() {
            dogs = JSON.parse(localStorage.getItem('pawfeed_v4') || '[]');
        }
        function saveData() {
            localStorage.setItem('pawfeed_v4', JSON.stringify(dogs));
        }

        function getMealCardClasses() {
            if (currentMealPeriod === 'Breakfast') {
                return 'bg-orange-950 border-orange-800';
            } else if (currentMealPeriod === 'Lunch') {
                return 'bg-sky-950 border-sky-800';
            } else if (currentMealPeriod === 'Dinner') {
                return 'bg-violet-950 border-violet-800';
            }
            return 'bg-zinc-900 border-zinc-700';
        }

        function renderMealSelector() {
            const container = document.getElementById('meal-selector');
            container.innerHTML = '';
            const meals = [
                { name: "Breakfast", icon: "fa-sun", color: "amber" },
                { name: "Lunch", icon: "fa-cloud-sun", color: "orange" },
                { name: "Dinner", icon: "fa-moon", color: "indigo" }
            ];
            meals.forEach(meal => {
                const active = currentMealPeriod === meal.name;
                const btn = document.createElement('button');
                btn.className = `py-2 text-sm rounded-2xl flex flex-col items-center justify-center font-bold ${active ? `bg-${meal.color}-500 text-white` : 'bg-zinc-800 text-zinc-300 border border-zinc-600'}`;
                btn.innerHTML = `<i class="fa-solid ${meal.icon}"></i><span class="text-xs mt-0.5">${meal.name}</span>`;
                btn.onclick = () => {
                    currentMealPeriod = meal.name;
                    renderMealSelector();
                    renderCurrentDogs();
                    renderAllDogs();
                };
                container.appendChild(btn);
            });
        }

        function switchLocation(location) {
            currentLocation = location;
            document.getElementById('facility-title').textContent = location;
            document.getElementById('facility-dropdown').classList.add('hidden');
            renderCurrentDogs();
            renderAllDogs();
        }

        async function fetchFromGingr(location) {
            const config = GINGR_CONFIG[location];
            const url = `https://corsproxy.io/?https://${config.subdomain}.gingrapp.com/api/v1/reservations`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ key: config.key, checked_in: 'true' })
                });
                const data = await res.json();
                const list = data.data || data;
                return Object.values(list).map(r => ({
                    id: 'g-' + r.animal.id,
                    name: r.animal.name,
                    breed: r.animal.breed || 'Unknown',
                    owner_last_name: r.owner?.last_name || '',
                    location: location,
                    gingr_id: r.animal.id,
                    logs: []
                }));
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        async function refreshFromGingr() {
            const newDogs = await fetchFromGingr(currentLocation);
            newDogs.forEach(nd => {
                if (!dogs.find(d => d.gingr_id === nd.gingr_id && d.location === currentLocation)) {
                    dogs.push(nd);
                }
            });
            saveData();
            renderCurrentDogs();
            renderAllDogs();
        }

        function renderCurrentDogs() {
            const container = document.getElementById('current-dogs');
            container.innerHTML = '';
            let filtered = dogs.filter(d => d.location === currentLocation);
            filtered.sort((a, b) => a.name.localeCompare(b.name));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-400">No dogs checked in at ${currentLocation}.</div>`;
                return;
            }

            const cardSkin = getMealCardClasses();

            filtered.forEach(dog => {
                const today = document.getElementById('log-date').value;
                const todayLog = dog.logs?.find(l => l.date === today);

                const card = document.createElement('div');
                card.className = `${cardSkin} rounded-3xl p-4`;

                let lastLogHTML = '';
                if (todayLog) {
                    lastLogHTML = `
                        <div class="mt-2 text-sm">
                            <div><span class="font-semibold">Ate:</span> ${todayLog.amountEaten}</div>
                            <div>Fresh Food: ${todayLog.fresh ? '✅' : '❌'}</div>
                        </div>
                    `;
                }

                let amountButtonsHTML = '';
                ['All', 'Half', 'Some', 'None'].forEach(amount => {
                    const isSelected = todayLog && todayLog.amountEaten === amount;
                    const selectedClass = isSelected 
                        ? 'bg-emerald-600 border-emerald-500 text-white font-semibold' 
                        : 'bg-zinc-800 border-zinc-600';
                    amountButtonsHTML += `
                        <button onclick="quickLogAmount('${dog.id}', '${amount}', this)" 
                                class="py-1.5 text-xs rounded-2xl border ${selectedClass} active:bg-zinc-700">
                            ${amount}
                        </button>
                    `;
                });

                const freshChecked = todayLog && todayLog.fresh ? 'checked' : '';

                card.innerHTML = `
                    <div class="mb-3">
                        <div class="font-bold text-lg">${dog.name} ${dog.owner_last_name ? `<span class="text-emerald-400 text-sm">(${dog.owner_last_name})</span>` : ''}</div>
                        <div class="text-emerald-400 text-sm mb-3">${dog.breed}</div>
                    </div>

                    <div class="flex gap-4 mb-3">
                        <div class="flex-1">
                            <div class="text-xs text-zinc-400 mb-1">How much did they eat?</div>
                            <div class="grid grid-cols-2 gap-1.5">
                                ${amountButtonsHTML}
                            </div>
                        </div>

                        <div class="flex flex-col justify-center">
                            <div class="text-sm text-zinc-300 mb-1">Fresh Food?</div>
                            <input type="checkbox" onchange="quickLogFresh('${dog.id}', this.checked)" class="w-6 h-6 accent-teal-600" ${freshChecked}>
                        </div>
                    </div>

                    ${lastLogHTML}

                    <div onclick="showHistory('${dog.id}')" class="text-right mt-2 cursor-pointer">
                        <span class="text-[10px] italic text-zinc-500">click to see history</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function quickLogAmount(dogId, amount, button) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            const date = document.getElementById('log-date').value;
            const meal = currentMealPeriod;

            if (!dog.logs) dog.logs = [];
            dog.logs = dog.logs.filter(l => !(l.date === date && l.mealPeriod === meal));

            dog.logs.push({
                date: date,
                timestamp: new Date().toISOString(),
                mealPeriod: meal,
                amountEaten: amount,
                fresh: false,
                notes: ''
            });

            saveData();
            renderCurrentDogs();
            renderAllDogs();
        }

        function quickLogFresh(dogId, isFresh) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            const date = document.getElementById('log-date').value;
            const meal = currentMealPeriod;

            if (!dog.logs) dog.logs = [];

            let existing = dog.logs.find(l => l.date === date && l.mealPeriod === meal);
            if (!existing) {
                existing = {
                    date: date,
                    timestamp: new Date().toISOString(),
                    mealPeriod: meal,
                    amountEaten: 'Some',
                    fresh: isFresh,
                    notes: ''
                };
                dog.logs.push(existing);
            } else {
                existing.fresh = isFresh;
            }

            saveData();
            renderCurrentDogs();
            renderAllDogs();
        }

        function renderAllDogs() {
            const container = document.getElementById('all-dogs-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';
            let filtered = dogs.filter(d => d.location === currentLocation);
            filtered.sort((a, b) => a.name.localeCompare(b.name));
            if (search) filtered = filtered.filter(d => d.name.toLowerCase().includes(search));

            filtered.forEach(dog => {
                const lastLog = dog.logs && dog.logs.length > 0 ? dog.logs[dog.logs.length - 1] : null;
                const row = document.createElement('div');
                row.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-4 flex justify-between items-center';
                row.innerHTML = `
                    <div>
                        <div class="font-semibold">${dog.name} ${dog.owner_last_name ? `(${dog.owner_last_name})` : ''}</div>
                        ${lastLog ? `<div class="text-xs text-zinc-400">Last: ${lastLog.amountEaten} ${lastLog.fresh ? '🌱' : ''}</div>` : ''}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function showHistory(dogId) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog || !dog.logs || dog.logs.length === 0) {
                alert("No history yet for this dog.");
                return;
            }

            let html = `<h3 class="text-xl font-semibold mb-4">${dog.name} - History</h3>`;
            dog.logs.slice().reverse().forEach(log => {
                const dateObj = new Date(log.date);
                const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
                const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                html += `
                    <div class="bg-zinc-800 px-3 py-2 rounded-2xl mb-2 text-sm">
                        <div>${dayName}, ${formattedDate} • ${log.mealPeriod} • ${log.amountEaten}</div>
                        ${log.fresh ? '<div class="text-emerald-400 text-xs mt-0.5">🌱 Fresh Food</div>' : ''}
                    </div>
                `;
            });

            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-6';
            modal.innerHTML = `
                <div class="bg-zinc-900 rounded-3xl max-w-lg w-full p-6 max-h-[80vh] overflow-auto">
                    ${html}
                    <button onclick="this.closest('.fixed').remove()" class="mt-6 w-full py-3 border border-zinc-600 rounded-2xl">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function quickLog(dogId) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            document.getElementById('modal-dog-name').textContent = dog.name;
            document.getElementById('modal-dog-breed').textContent = dog.breed || '';
            document.getElementById('log-modal').dataset.dogId = dogId;

            const today = document.getElementById('log-date').value;
            const todayLog = dog.logs?.find(l => l.date === today);

            const amountContainer = document.getElementById('quick-amount-buttons');
            amountContainer.innerHTML = '';

            ['All', 'Half', 'Some', 'None'].forEach(amount => {
                const btn = document.createElement('button');
                btn.className = 'py-3 text-sm rounded-2xl border border-zinc-600 bg-zinc-800 active:bg-zinc-700 transition-colors';
                btn.textContent = amount;
                amountContainer.appendChild(btn);
            });

            if (todayLog && todayLog.amountEaten) {
                const matchingButton = Array.from(amountContainer.children).find(b => b.textContent === todayLog.amountEaten);
                if (matchingButton) {
                    matchingButton.classList.remove('bg-zinc-800', 'border-zinc-600');
                    matchingButton.classList.add('bg-emerald-600', 'border-emerald-500', 'text-white', 'font-semibold');
                    amountContainer.dataset.selectedAmount = todayLog.amountEaten;
                }
            }

            Array.from(amountContainer.children).forEach(btn => {
                btn.onclick = () => {
                    Array.from(amountContainer.children).forEach(b => {
                        b.classList.remove('bg-emerald-600', 'border-emerald-500', 'text-white', 'font-semibold');
                        b.classList.add('bg-zinc-800', 'border-zinc-600');
                    });
                    btn.classList.remove('bg-zinc-800', 'border-zinc-600');
                    btn.classList.add('bg-emerald-600', 'border-emerald-500', 'text-white', 'font-semibold');
                    amountContainer.dataset.selectedAmount = btn.textContent;
                };
            });

            document.getElementById('fresh-food-toggle').checked = todayLog ? todayLog.fresh : false;
            document.getElementById('log-notes').value = todayLog ? (todayLog.notes || '') : '';

            document.getElementById('log-modal').classList.remove('hidden');
            document.getElementById('log-modal').classList.add('flex');
        }

        function closeLogModal() {
            document.getElementById('log-modal').classList.remove('flex');
            document.getElementById('log-modal').classList.add('hidden');
        }

        function saveQuickLog() {
            const dogId = document.getElementById('log-modal').dataset.dogId;
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            const amountContainer = document.getElementById('quick-amount-buttons');
            const amount = amountContainer.dataset.selectedAmount || 'Some';
            const fresh = document.getElementById('fresh-food-toggle').checked;
            const notes = document.getElementById('log-notes').value.trim();
            const date = document.getElementById('log-date').value;

            if (!dog.logs) dog.logs = [];
            dog.logs = dog.logs.filter(l => l.date !== date);

            dog.logs.push({
                date: date,
                timestamp: new Date().toISOString(),
                mealPeriod: currentMealPeriod,
                amountEaten: amount,
                fresh: fresh,
                notes: notes
            });

            saveData();
            closeLogModal();
            renderCurrentDogs();
            renderAllDogs();
        }

        function initialize() {
            loadData();
            document.getElementById('log-date').value = getTodayDate();
            renderMealSelector();
            document.getElementById('facility-title').textContent = currentLocation;
            switchLocation('House of Woof');
        }

        window.onload = initialize;
    </script>
</body>
</html>
