<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFeed • Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .meal-tab {
            transition: all 0.2s ease;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .meal-tab.active {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">PawFeed</h1>
                <p class="text-emerald-400 text-sm">House of Woof + Don Doggos</p>
            </div>
            <div class="flex items-center gap-x-2">
                <button onclick="exportData()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-download"></i>
                    <span class="hidden sm:inline">Export</span>
                </button>
                <button onclick="importData()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-upload"></i>
                    <span class="hidden sm:inline">Import</span>
                </button>
            </div>
        </div>

        <!-- Location Tabs -->
        <div class="flex gap-x-2 mb-6">
            <button onclick="switchLocation('House of Woof')" id="tab-House of Woof"
                    class="flex-1 sm:flex-none px-6 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 bg-emerald-600 text-white">
                <i class="fa-solid fa-home"></i> House of Woof
            </button>
            <button onclick="switchLocation('Don Doggos')" id="tab-Don Doggos"
                    class="flex-1 sm:flex-none px-6 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600">
                <i class="fa-solid fa-home"></i> Don Doggos
            </button>
        </div>

        <!-- Meal Period Selector -->
        <div class="mb-6">
            <div class="text-sm text-zinc-400 mb-2 px-1 font-medium">CURRENT MEAL PERIOD</div>
            <div class="grid grid-cols-3 gap-3" id="meal-selector">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Currently Checked In -->
        <div class="mb-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold">Currently Checked In</h2>
                <button onclick="showAddDogModal()" class="px-5 py-2.5 bg-white text-zinc-900 rounded-2xl text-sm font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add Dog</span>
                </button>
            </div>
            
            <div id="current-dogs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Dog cards populated by JS -->
            </div>
        </div>

        <!-- All Dogs -->
        <div>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold">All Dogs</h2>
                <input id="search-input" type="text" placeholder="Search dogs..." oninput="renderAllDogs()" 
                       class="bg-zinc-900 border border-zinc-700 px-4 py-2.5 rounded-2xl text-sm w-72">
            </div>
            <div id="all-dogs-list" class="space-y-3">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="log-modal" onclick="if (event.target.id === 'log-modal') closeLogModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6 border border-zinc-700">
            
            <div class="flex justify-between items-center mb-5">
                <div>
                    <div id="modal-dog-name" class="text-2xl font-bold"></div>
                    <div id="modal-dog-breed" class="text-emerald-400"></div>
                </div>
                <button onclick="closeLogModal()" class="text-3xl text-zinc-400 hover:text-white leading-none">&times;</button>
            </div>

            <div class="space-y-5">
                <div>
                    <div class="text-sm text-zinc-400 mb-2">How much did they eat?</div>
                    <div class="grid grid-cols-4 gap-2" id="quick-amount-buttons"></div>
                </div>

                <div class="flex items-center justify-between bg-zinc-800 rounded-2xl p-4">
                    <div>
                        <div class="font-semibold">Ate Fresh Food?</div>
                        <div class="text-xs text-teal-400">Feenys Finest</div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="fresh-food-toggle" class="sr-only peer">
                        <div class="w-14 h-8 bg-zinc-600 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-teal-600"></div>
                    </label>
                </div>

                <div>
                    <div class="text-sm text-zinc-400 mb-1.5">Notes (optional)</div>
                    <textarea id="log-notes" rows="2" placeholder="Ate slowly..." class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-3 text-sm"></textarea>
                </div>
            </div>

            <button onclick="saveQuickLog()" class="mt-6 w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold text-lg">
                Save Log
            </button>
        </div>
    </div>

    <script>
        const GINGR_CONFIG = {
            "House of Woof": { subdomain: "houseofwoof", key: "d85f17396d2e976ac3de5fe774a3c58d" },
            "Don Doggos": { subdomain: "dondoggos", key: "0a444b85e60d67d335d7e937b4b2202f" }
        };

        let dogs = [];
        let currentLocation = "House of Woof";
        let currentMealPeriod = "Breakfast";

        const MEAL_OPTIONS = [
            { name: "Breakfast", color: "amber" },
            { name: "Lunch", color: "orange" },
            { name: "Dinner", color: "indigo" }
        ];

        function loadData() {
            const saved = localStorage.getItem('pawfeed_v4');
            dogs = saved ? JSON.parse(saved) : [];
        }
        function saveData() {
            localStorage.setItem('pawfeed_v4', JSON.stringify(dogs));
        }

        function renderMealSelector() {
            const container = document.getElementById('meal-selector');
            container.innerHTML = '';

            MEAL_OPTIONS.forEach(meal => {
                const isActive = currentMealPeriod === meal.name;
                const btn = document.createElement('button');
                
                let bg = isActive ? 
                    (meal.color === 'amber' ? 'bg-amber-500 text-white' : 
                     meal.color === 'orange' ? 'bg-orange-500 text-white' : 'bg-indigo-500 text-white') 
                    : 'bg-zinc-800 text-zinc-300 border border-zinc-600';

                btn.className = `meal-tab py-4 rounded-3xl flex flex-col items-center justify-center gap-y-1 ${bg}`;
                btn.innerHTML = `
                    <i class="fa-solid ${meal.name === 'Breakfast' ? 'fa-sun' : meal.name === 'Lunch' ? 'fa-cloud-sun' : 'fa-moon'} text-2xl"></i>
                    <span class="font-bold tracking-wide">${meal.name}</span>
                `;
                btn.onclick = () => {
                    currentMealPeriod = meal.name;
                    renderMealSelector();
                };
                container.appendChild(btn);
            });
        }

        function switchLocation(location) {
            currentLocation = location;
            document.getElementById('tab-House of Woof').className = location === 'House of Woof' 
                ? 'flex-1 sm:flex-none px-6 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 bg-emerald-600 text-white'
                : 'flex-1 sm:flex-none px-6 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600';
            
            document.getElementById('tab-Don Doggos').className = location === 'Don Doggos' 
                ? 'flex-1 sm:flex-none px-6 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 bg-emerald-600 text-white'
                : 'flex-1 sm:flex-none px-6 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600';

            renderCurrentDogs();
            renderAllDogs();
        }

        function renderCurrentDogs() {
            const container = document.getElementById('current-dogs');
            container.innerHTML = '';
            const filtered = dogs.filter(d => d.location === currentLocation);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-zinc-400">No dogs checked in at ${currentLocation}.</div>`;
                return;
            }

            filtered.forEach(dog => {
                const card = document.createElement('div');
                card.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-5';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div onclick="toggleHistory(this, '${dog.id}')" class="cursor-pointer">
                            <div class="font-bold text-2xl">${dog.name}</div>
                            <div class="text-emerald-400 text-sm">${dog.breed || ''}</div>
                        </div>
                        <button onclick="event.stopImmediatePropagation(); quickLog('${dog.id}')" 
                                class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-bold">LOG</button>
                    </div>
                    <div id="history-${dog.id}" class="hidden mt-4 pt-4 border-t border-zinc-700 text-sm space-y-2"></div>
                `;
                container.appendChild(card);
            });
        }

        function renderAllDogs() {
            const container = document.getElementById('all-dogs-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            let filtered = dogs.filter(d => d.location === currentLocation);
            if (search) filtered = filtered.filter(d => d.name.toLowerCase().includes(search) || (d.breed && d.breed.toLowerCase().includes(search)));

            filtered.forEach(dog => {
                const row = document.createElement('div');
                row.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-4 flex justify-between items-center';
                row.innerHTML = `
                    <div onclick="toggleHistory(this, '${dog.id}')" class="cursor-pointer flex-1">
                        <div class="font-semibold">${dog.name}</div>
                        <div class="text-xs text-emerald-400">${dog.logs ? dog.logs.length : 0} logs</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation(); quickLog('${dog.id}')" class="px-5 py-2 bg-emerald-600 rounded-2xl text-sm font-bold">LOG</button>
                `;
                container.appendChild(row);
            });
        }

        function toggleHistory(element, dogId) {
            const div = document.getElementById('history-' + dogId);
            if (!div) return;
            if (!div.classList.contains('hidden')) { div.classList.add('hidden'); return; }

            const dog = dogs.find(d => d.id === dogId);
            if (!dog || !dog.logs || dog.logs.length === 0) {
                div.innerHTML = `<div class="text-zinc-400 text-sm">No records yet.</div>`;
                div.classList.remove('hidden');
                return;
            }

            let html = '';
            dog.logs.slice().reverse().forEach(log => {
                html += `<div class="bg-zinc-800 px-3 py-2 rounded-2xl text-sm">${log.mealPeriod} • ${log.amountEaten} ${log.fresh ? '🌱 Fresh' : ''}</div>`;
            });
            div.innerHTML = html;
            div.classList.remove('hidden');
        }

        function quickLog(dogId) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            document.getElementById('modal-dog-name').textContent = dog.name;
            document.getElementById('modal-dog-breed').textContent = dog.breed || '';
            document.getElementById('log-modal').dataset.dogId = dogId;
            document.getElementById('log-modal').classList.remove('hidden');
            document.getElementById('log-modal').classList.add('flex');

            renderQuickAmount();
        }

        function renderQuickAmount() {
            const container = document.getElementById('quick-amount-buttons');
            container.innerHTML = '';
            ['All','Half','Some','None'].forEach(amount => {
                const btn = document.createElement('button');
                btn.className = `py-3 rounded-2xl text-sm font-bold border border-zinc-600 bg-zinc-800`;
                btn.textContent = amount;
                btn.onclick = () => {
                    Array.from(container.children).forEach(b => b.classList.remove('!bg-emerald-600'));
                    btn.classList.add('!bg-emerald-600');
                    container.dataset.selected = amount;
                };
                container.appendChild(btn);
            });
        }

        function closeLogModal() {
            document.getElementById('log-modal').classList.remove('flex');
            document.getElementById('log-modal').classList.add('hidden');
        }

        function saveQuickLog() {
            const dogId = document.getElementById('log-modal').dataset.dogId;
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            const amount = document.getElementById('quick-amount-buttons').dataset.selected || 'Some';
            const fresh = document.getElementById('fresh-food-toggle').checked;
            const notes = document.getElementById('log-notes').value.trim();

            if (!dog.logs) dog.logs = [];
            dog.logs.push({
                timestamp: new Date().toISOString(),
                mealPeriod: currentMealPeriod,
                amountEaten: amount,
                fresh: fresh,
                notes: notes
            });

            saveData();
            closeLogModal();
            renderCurrentDogs();
            renderAllDogs();
        }

        function showAddDogModal() {
            const name = prompt("Dog name:");
            if (!name) return;
            dogs.push({ id: 'm-' + Date.now(), name: name.trim(), breed: "", location: currentLocation, logs: [] });
            saveData();
            renderCurrentDogs();
            renderAllDogs();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(dogs, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `pawfeed-${currentLocation}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        dogs = imported;
                        saveData();
                        renderCurrentDogs();
                        renderAllDogs();
                    } catch(err) { alert("Invalid file"); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        function initialize() {
            loadData();
            renderMealSelector();
            switchLocation('House of Woof');
        }

        window.onload = initialize;
    </script>
</body>
</html>
