<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFeed • Feeding Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .log-entry { transition: all 0.1s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight">PawFeed</h1>
                <p class="text-emerald-400 text-sm">House of Woof + Don Doggos • Feeding History</p>
            </div>
            <div class="flex items-center gap-x-3">
                <button onclick="refreshFromGingr()" 
                        class="flex items-center gap-x-2 px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-sync"></i>
                    <span>Refresh from Gingr</span>
                </button>
            </div>
        </div>

        <!-- Location Tabs -->
        <div class="flex gap-x-2 mb-6">
            <button onclick="switchLocation('House of Woof')" id="tab-House of Woof"
                    class="px-6 py-3 rounded-2xl font-semibold flex items-center gap-x-2 bg-emerald-600 text-white">
                <i class="fa-solid fa-home"></i> House of Woof
            </button>
            <button onclick="switchLocation('Don Doggos')" id="tab-Don Doggos"
                    class="px-6 py-3 rounded-2xl font-semibold flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600">
                <i class="fa-solid fa-home"></i> Don Doggos
            </button>
        </div>

        <!-- Currently Checked In -->
        <div class="mb-8">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xl font-semibold">Currently Checked In</h2>
                <button onclick="showAddDogModal()" class="text-sm px-4 py-2 bg-white text-zinc-900 rounded-2xl font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i> Add Dog Manually
                </button>
            </div>
            
            <div id="current-dogs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Historical Dogs / Search -->
        <div>
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xl font-semibold">All Dogs &amp; History</h2>
                <input id="search-input" type="text" placeholder="Search dogs..." 
                       oninput="renderAllDogs()" 
                       class="bg-zinc-900 border border-zinc-700 px-4 py-2 rounded-2xl text-sm w-72">
            </div>
            <div id="all-dogs-list" class="space-y-3">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Log Meal Modal -->
    <div id="log-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md p-6 border border-zinc-700">
            <h3 class="text-2xl font-semibold mb-1" id="modal-dog-name"></h3>
            <p class="text-emerald-400 mb-6" id="modal-dog-breed"></p>

            <div class="space-y-4">
                <div>
                    <label class="text-sm text-zinc-400">Meal Period</label>
                    <select id="meal-period" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-3 mt-1">
                        <option>Breakfast</option>
                        <option>Lunch</option>
                        <option>Dinner</option>
                        <option>Snack / Other</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm text-zinc-400">Food Type</label>
                    <select id="food-type" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-3 mt-1">
                        <option>Standard Kibble</option>
                        <option>Feenys Finest (Fresh)</option>
                        <option>Mix (Kibble + Fresh)</option>
                        <option>Other</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm text-zinc-400">Amount / Notes</label>
                    <textarea id="log-notes" rows="3" placeholder="Ate 1 cup of Feenys Finest. Left a little."
                              class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-3 mt-1"></textarea>
                </div>
            </div>

            <div class="flex gap-x-3 mt-6">
                <button onclick="closeLogModal()" class="flex-1 py-3 rounded-2xl border border-zinc-600">Cancel</button>
                <button onclick="saveFeedingLog()" class="flex-1 py-3 bg-emerald-600 rounded-2xl font-semibold">Save Log</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const GINGR_CONFIG = {
            "House of Woof": {
                subdomain: "houseofwoof",
                key: "d85f17396d2e976ac3de5fe774a3c58d"
            },
            "Don Doggos": {
                subdomain: "dondoggos",
                key: "0a444b85e60d67d335d7e937b4b2202f"
            }
        };

        let dogs = []; // All dogs with their logs
        let currentLocation = "House of Woof";

        function loadData() {
            const saved = localStorage.getItem('pawfeed_data_v3');
            dogs = saved ? JSON.parse(saved) : [];
        }

        function saveData() {
            localStorage.setItem('pawfeed_data_v3', JSON.stringify(dogs));
        }

        function switchLocation(location) {
            currentLocation = location;
            document.getElementById('tab-House of Woof').className = 
                location === 'House of Woof' 
                    ? 'px-6 py-3 rounded-2xl font-semibold flex items-center gap-x-2 bg-emerald-600 text-white'
                    : 'px-6 py-3 rounded-2xl font-semibold flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600';
            
            document.getElementById('tab-Don Doggos').className = 
                location === 'Don Doggos' 
                    ? 'px-6 py-3 rounded-2xl font-semibold flex items-center gap-x-2 bg-emerald-600 text-white'
                    : 'px-6 py-3 rounded-2xl font-semibold flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600';

            renderCurrentDogs();
            renderAllDogs();
        }

        // Fetch from Gingr via CORS proxy
        async function fetchFromGingr(location) {
            const config = GINGR_CONFIG[location];
            if (!config) return [];

            const proxyUrl = `https://corsproxy.io/?https://${config.subdomain}.gingrapp.com/api/v1/reservations`;
            
            try {
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        key: config.key,
                        checked_in: 'true'
                    })
                });

                const data = await response.json();
                const reservations = data.data || data;

                return Object.values(reservations).map(r => ({
                    id: 'g-' + r.animal.id,
                    name: r.animal.name,
                    breed: r.animal.breed || 'Unknown',
                    location: location,
                    gingr_id: r.animal.id,
                    logs: []
                }));
            } catch (err) {
                console.error("Failed to fetch from Gingr:", err);
                return [];
            }
        }

        async function refreshFromGingr() {
            const newDogs = await fetchFromGingr(currentLocation);
            
            // Merge with existing dogs (keep logs)
            newDogs.forEach(newDog => {
                const existing = dogs.find(d => d.gingr_id === newDog.gingr_id && d.location === currentLocation);
                if (!existing) {
                    dogs.push(newDog);
                }
            });

            saveData();
            renderCurrentDogs();
            renderAllDogs();
            alert(`Synced ${newDogs.length} dogs from ${currentLocation}`);
        }

        function renderCurrentDogs() {
            const container = document.getElementById('current-dogs');
            container.innerHTML = '';

            const currentDogs = dogs.filter(d => d.location === currentLocation);

            if (currentDogs.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-400">No dogs currently checked in at ${currentLocation}.</div>`;
                return;
            }

            currentDogs.forEach(dog => {
                const lastLog = dog.logs.length > 0 ? dog.logs[dog.logs.length - 1] : null;
                
                const el = document.createElement('div');
                el.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-5';
                el.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-semibold text-xl">${dog.name}</div>
                            <div class="text-emerald-400 text-sm">${dog.breed}</div>
                        </div>
                        <button onclick="openLogModal('${dog.id}')" 
                                class="px-4 py-1.5 text-sm bg-emerald-600 rounded-2xl font-medium">Log Meal</button>
                    </div>
                    ${lastLog ? `
                        <div class="mt-4 text-xs text-zinc-400">
                            Last: ${lastLog.mealPeriod} • ${lastLog.foodType}<br>
                            <span class="text-zinc-500">${lastLog.notes || ''}</span>
                        </div>
                    ` : ''}
                    <button onclick="showDogHistory('${dog.id}')" class="mt-4 text-xs text-emerald-400 hover:underline">View full history →</button>
                `;
                container.appendChild(el);
            });
        }

        function renderAllDogs() {
            const container = document.getElementById('all-dogs-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            let filtered = dogs.filter(d => 
                d.location === currentLocation && 
                (d.name.toLowerCase().includes(search) || (d.breed && d.breed.toLowerCase().includes(search)))
            );

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-zinc-400 py-4">No dogs found.</div>`;
                return;
            }

            filtered.forEach(dog => {
                const freshMeals = dog.logs.filter(l => l.foodType.includes('Feenys')).length;
                const totalLogs = dog.logs.length;

                const el = document.createElement('div');
                el.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-5 flex justify-between items-center';
                el.innerHTML = `
                    <div>
                        <div class="font-semibold">${dog.name} <span class="text-xs text-zinc-400">(${dog.breed})</span></div>
                        <div class="text-xs text-emerald-400">${totalLogs} logs • ${freshMeals} Feenys Finest meals</div>
                    </div>
                    <div class="flex gap-x-2">
                        <button onclick="openLogModal('${dog.id}')" class="px-4 py-2 text-sm bg-emerald-600 rounded-2xl">Log Meal</button>
                        <button onclick="showDogHistory('${dog.id}')" class="px-4 py-2 text-sm border border-zinc-600 rounded-2xl">History</button>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function openLogModal(dogId) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            document.getElementById('modal-dog-name').textContent = dog.name;
            document.getElementById('modal-dog-breed').textContent = dog.breed;
            document.getElementById('log-modal').classList.remove('hidden');
            document.getElementById('log-modal').dataset.dogId = dogId;
        }

        function closeLogModal() {
            document.getElementById('log-modal').classList.add('hidden');
        }

        function saveFeedingLog() {
            const dogId = document.getElementById('log-modal').dataset.dogId;
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            const newLog = {
                timestamp: new Date().toISOString(),
                mealPeriod: document.getElementById('meal-period').value,
                foodType: document.getElementById('food-type').value,
                notes: document.getElementById('log-notes').value.trim()
            };

            if (!dog.logs) dog.logs = [];
            dog.logs.push(newLog);

            saveData();
            closeLogModal();
            renderCurrentDogs();
            renderAllDogs();
        }

        function showDogHistory(dogId) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog || !dog.logs || dog.logs.length === 0) {
                alert("No feeding history for this dog yet.");
                return;
            }

            let html = `<h3 class="text-xl font-semibold mb-4">${dog.name} — Feeding History</h3><div class="space-y-3">`;
            
            dog.logs.slice().reverse().forEach(log => {
                html += `
                    <div class="bg-zinc-800 p-4 rounded-2xl text-sm">
                        <div class="flex justify-between">
                            <span class="font-medium">${log.mealPeriod}</span>
                            <span class="text-xs text-zinc-400">${new Date(log.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="text-emerald-400 mt-1">${log.foodType}</div>
                        ${log.notes ? `<div class="text-zinc-300 mt-1">${log.notes}</div>` : ''}
                    </div>
                `;
            });
            html += `</div>`;

            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-6';
            modal.innerHTML = `
                <div class="bg-zinc-900 rounded-3xl max-w-lg w-full p-6 max-h-[80vh] overflow-auto">
                    ${html}
                    <button onclick="this.closest('.fixed').remove()" class="mt-6 w-full py-3 border border-zinc-600 rounded-2xl">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function showAddDogModal() {
            const name = prompt("Dog name:");
            if (!name) return;
            const breed = prompt("Breed:") || "Unknown";

            dogs.push({
                id: 'manual-' + Date.now(),
                name: name.trim(),
                breed: breed.trim(),
                location: currentLocation,
                logs: []
            });
            saveData();
            renderCurrentDogs();
            renderAllDogs();
        }

        function initialize() {
            loadData();
            switchLocation('House of Woof');
            
            // Try to auto-load on first visit
            setTimeout(() => {
                if (dogs.length === 0) {
                    refreshFromGingr();
                }
            }, 800);
        }

        window.onload = initialize;
    </script>
</body>
</html>
