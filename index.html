<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFeed • Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="relative">
                <div onclick="toggleFacilityDropdown()" class="flex items-center gap-x-2 cursor-pointer">
                    <h1 id="facility-title" class="text-4xl font-bold tracking-tight">House of Woof</h1>
                    <i class="fa-solid fa-chevron-down text-xl text-emerald-400"></i>
                </div>
                
                <div id="facility-dropdown" class="hidden absolute mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-2xl shadow-xl z-50">
                    <div onclick="switchLocation('House of Woof')" class="px-4 py-3 hover:bg-zinc-800 rounded-t-2xl cursor-pointer flex items-center gap-x-2">
                        <i class="fa-solid fa-home text-emerald-400"></i>
                        <span>House of Woof</span>
                    </div>
                    <div onclick="switchLocation('Don Doggos')" class="px-4 py-3 hover:bg-zinc-800 rounded-b-2xl cursor-pointer flex items-center gap-x-2">
                        <i class="fa-solid fa-home text-emerald-400"></i>
                        <span>Don Doggos</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-x-2">
                <button onclick="exportCSV()" 
                        class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-download"></i>
                    <span>Export</span>
                </button>
                
                <button onclick="refreshFromGingr()" 
                        class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-sync"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </div>

        <!-- Date + Meal Period -->
        <div class="mb-6 flex items-end gap-x-4">
            <div>
                <div class="text-sm text-zinc-400 mb-1 px-1">DATE</div>
                <input type="date" id="log-date" value="" 
                       class="bg-emerald-900/30 border border-emerald-600 text-emerald-300 rounded-2xl px-4 py-2 text-sm font-medium">
            </div>
            
            <div class="flex-1">
                <div class="text-sm text-zinc-400 mb-1 px-1">MEAL PERIOD</div>
                <div class="grid grid-cols-3 gap-2" id="meal-selector"></div>
            </div>
        </div>

        <!-- Currently Checked In -->
        <div class="mb-8">
            <h2 class="text-2xl font-semibold mb-4">Currently Checked In</h2>
            <div id="current-dogs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- All Dogs -->
        <div>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold">All Dogs</h2>
                <input id="search-input" type="text" placeholder="Search dogs..." oninput="renderAllDogs()" 
                       class="bg-zinc-900 border border-zinc-700 px-4 py-2.5 rounded-2xl text-sm w-72">
            </div>
            <div id="all-dogs-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="log-modal" onclick="if (event.target.id === 'log-modal') closeLogModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6 border border-zinc-700">
            
            <div class="flex justify-between items-center mb-5">
                <div>
                    <div id="modal-dog-name" class="text-2xl font-bold"></div>
                    <div id="modal-dog-breed" class="text-emerald-400"></div>
                </div>
                <button onclick="closeLogModal()" class="text-3xl text-zinc-400 hover:text-white">&times;</button>
            </div>

            <div class="space-y-5">
                <div>
                    <div class="text-sm text-zinc-400 mb-2">How much did they eat?</div>
                    <div class="grid grid-cols-4 gap-2" id="quick-amount-buttons"></div>
                </div>

                <div class="flex items-center justify-between bg-zinc-800 rounded-2xl p-4">
                    <div class="font-semibold">Ate Fresh Food?</div>
                    <input type="checkbox" id="fresh-food-toggle" class="w-6 h-6 accent-teal-600">
                </div>

                <textarea id="log-notes" rows="2" placeholder="Notes..." class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-3 text-sm"></textarea>
            </div>

            <button onclick="saveQuickLog()" class="mt-6 w-full py-4 bg-emerald-600 rounded-2xl font-bold text-lg">Save Log</button>
        </div>
    </div>

    <script>
        const GINGR_CONFIG = {
            "House of Woof": { subdomain: "houseofwoof", key: "d85f17396d2e976ac3de5fe774a3c58d" },
            "Don Doggos": { subdomain: "dondoggos", key: "0a444b85e60d67d335d7e937b4b2202f" }
        };

        let dogs = [];
        let currentLocation = "House of Woof";
        let currentMealPeriod = "Breakfast";

        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }

        function loadData() {
            dogs = JSON.parse(localStorage.getItem('pawfeed_v4') || '[]');
        }
        function saveData() {
            localStorage.setItem('pawfeed_v4', JSON.stringify(dogs));
        }

        function updateFacilityTitle() {
            document.getElementById('facility-title').textContent = currentLocation;
        }

        function toggleFacilityDropdown() {
            const dropdown = document.getElementById('facility-dropdown');
            dropdown.classList.toggle('hidden');
        }

        function renderMealSelector() {
            const container = document.getElementById('meal-selector');
            container.innerHTML = '';
            const meals = [
                { name: "Breakfast", icon: "fa-sun", color: "amber" },
                { name: "Lunch", icon: "fa-cloud-sun", color: "orange" },
                { name: "Dinner", icon: "fa-moon", color: "indigo" }
            ];
            meals.forEach(meal => {
                const active = currentMealPeriod === meal.name;
                const btn = document.createElement('button');
                btn.className = `py-2.5 text-sm rounded-2xl flex flex-col items-center justify-center font-bold ${active ? `bg-${meal.color}-500 text-white` : 'bg-zinc-800 text-zinc-300 border border-zinc-600'}`;
                btn.innerHTML = `<i class="fa-solid ${meal.icon}"></i><span class="text-xs mt-0.5">${meal.name}</span>`;
                btn.onclick = () => {
                    currentMealPeriod = meal.name;
                    renderMealSelector();
                };
                container.appendChild(btn);
            });
        }

        function switchLocation(location) {
            currentLocation = location;
            updateFacilityTitle();
            document.getElementById('facility-dropdown').classList.add('hidden');
            renderCurrentDogs();
            renderAllDogs();
        }

        async function fetchFromGingr(location) {
            const config = GINGR_CONFIG[location];
            const url = `https://corsproxy.io/?https://${config.subdomain}.gingrapp.com/api/v1/reservations`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ key: config.key, checked_in: 'true' })
                });
                const data = await res.json();
                const list = data.data || data;
                return Object.values(list).map(r => ({
                    id: 'g-' + r.animal.id,
                    name: r.animal.name,
                    breed: r.animal.breed || 'Unknown',
                    owner_last_name: r.owner?.last_name || '',
                    location: location,
                    gingr_id: r.animal.id,
                    logs: []
                }));
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        async function refreshFromGingr() {
            const newDogs = await fetchFromGingr(currentLocation);
            newDogs.forEach(nd => {
                if (!dogs.find(d => d.gingr_id === nd.gingr_id && d.location === currentLocation)) {
                    dogs.push(nd);
                }
            });
            saveData();
            renderCurrentDogs();
            renderAllDogs();
        }

        function renderCurrentDogs() {
            const container = document.getElementById('current-dogs');
            container.innerHTML = '';
            let filtered = dogs.filter(d => d.location === currentLocation);
            filtered.sort((a, b) => a.name.localeCompare(b.name));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-400">No dogs checked in at ${currentLocation}.</div>`;
                return;
            }

            filtered.forEach(dog => {
                const lastLog = dog.logs && dog.logs.length > 0 ? dog.logs[dog.logs.length - 1] : null;

                let previewHTML = '';
                if (lastLog) {
                    const notePreview = lastLog.notes ? lastLog.notes.substring(0, 45) + (lastLog.notes.length > 45 ? '...' : '') : '';
                    previewHTML = `
                        <div class="mt-2 text-sm space-y-0.5">
                            <div><span class="font-semibold">Ate:</span> ${lastLog.amountEaten}</div>
                            <div>Fresh Food: ${lastLog.fresh ? '✅' : '❌'}</div>
                            ${notePreview ? `<div class="text-zinc-400 text-xs line-clamp-1">${notePreview}</div>` : ''}
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-4 cursor-pointer';
                card.onclick = () => quickLog(dog.id);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div>
                                <span class="font-bold text-lg">${dog.name}</span>
                                ${dog.owner_last_name ? `<span class="text-emerald-400 text-sm">(${dog.owner_last_name})</span>` : ''}
                            </div>
                            <div class="text-emerald-400 text-sm">${dog.breed}</div>
                        </div>
                    </div>
                    ${previewHTML}
                `;
                container.appendChild(card);
            });
        }

        function renderAllDogs() {
            const container = document.getElementById('all-dogs-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';
            let filtered = dogs.filter(d => d.location === currentLocation);
            filtered.sort((a, b) => a.name.localeCompare(b.name));
            if (search) filtered = filtered.filter(d => d.name.toLowerCase().includes(search));

            filtered.forEach(dog => {
                const lastLog = dog.logs && dog.logs.length > 0 ? dog.logs[dog.logs.length - 1] : null;
                const row = document.createElement('div');
                row.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-4 flex justify-between items-center cursor-pointer';
                row.onclick = () => quickLog(dog.id);
                
                row.innerHTML = `
                    <div>
                        <div>
                            <span class="font-semibold">${dog.name}</span>
                            ${dog.owner_last_name ? `<span class="text-emerald-400 text-sm">(${dog.owner_last_name})</span>` : ''}
                        </div>
                        ${lastLog ? `<div class="text-xs text-zinc-400">Last: ${lastLog.amountEaten} ${lastLog.fresh ? '🌱' : ''}</div>` : ''}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function quickLog(dogId) {
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            document.getElementById('modal-dog-name').textContent = dog.name;
            document.getElementById('modal-dog-breed').textContent = dog.breed || '';
            document.getElementById('log-modal').dataset.dogId = dogId;

            const today = document.getElementById('log-date').value;
            const todayLog = dog.logs?.find(l => l.date === today);

            const amountContainer = document.getElementById('quick-amount-buttons');
            amountContainer.innerHTML = '';
            ['All', 'Half', 'Some', 'None'].forEach(amount => {
                const btn = document.createElement('button');
                btn.className = `py-3 rounded-2xl text-sm font-bold border border-zinc-600 bg-zinc-800`;
                btn.textContent = amount;
                if (todayLog && todayLog.amountEaten === amount) {
                    btn.classList.add('!bg-emerald-600', '!border-emerald-500');
                    amountContainer.dataset.selectedAmount = amount;
                }
                btn.onclick = () => {
                    Array.from(amountContainer.children).forEach(b => b.classList.remove('!bg-emerald-600', '!border-emerald-500'));
                    btn.classList.add('!bg-emerald-600', '!border-emerald-500');
                    amountContainer.dataset.selectedAmount = amount;
                };
                amountContainer.appendChild(btn);
            });

            document.getElementById('fresh-food-toggle').checked = todayLog ? todayLog.fresh : false;
            document.getElementById('log-notes').value = todayLog ? (todayLog.notes || '') : '';

            document.getElementById('log-modal').classList.remove('hidden');
            document.getElementById('log-modal').classList.add('flex');
        }

        function closeLogModal() {
            document.getElementById('log-modal').classList.remove('flex');
            document.getElementById('log-modal').classList.add('hidden');
        }

        function saveQuickLog() {
            const dogId = document.getElementById('log-modal').dataset.dogId;
            const dog = dogs.find(d => d.id === dogId);
            if (!dog) return;

            const amountContainer = document.getElementById('quick-amount-buttons');
            const amount = amountContainer.dataset.selectedAmount || 'Some';
            const fresh = document.getElementById('fresh-food-toggle').checked;
            const notes = document.getElementById('log-notes').value.trim();
            const date = document.getElementById('log-date').value;

            if (!dog.logs) dog.logs = [];
            dog.logs = dog.logs.filter(l => l.date !== date);

            dog.logs.push({
                date: date,
                timestamp: new Date().toISOString(),
                mealPeriod: currentMealPeriod,
                amountEaten: amount,
                fresh: fresh,
                notes: notes
            });

            saveData();
            closeLogModal();
            renderCurrentDogs();
            renderAllDogs();
        }

        function exportCSV() {
            const date = document.getElementById('log-date').value;
            const meal = currentMealPeriod;

            const filteredLogs = [];

            dogs.forEach(dog => {
                const log = dog.logs?.find(l => l.date === date && l.mealPeriod === meal);
                if (log) {
                    filteredLogs.push({
                        Date: date,
                        Meal: meal,
                        Dog: dog.name,
                        Owner: dog.owner_last_name || '',
                        Breed: dog.breed,
                        Ate: log.amountEaten,
                        FreshFood: log.fresh ? 'Yes' : 'No',
                        Notes: log.notes || ''
                    });
                }
            });

            if (filteredLogs.length === 0) {
                alert("No logs found for this date and meal period.");
                return;
            }

            const headers = Object.keys(filteredLogs[0]);
            let csv = headers.join(',') + '\n';

            filteredLogs.forEach(row => {
                csv += headers.map(h => `"${row[h] || ''}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pawfeed-${date}-${meal}.csv`;
            a.click();
        }

        function initialize() {
            loadData();

            const dateInput = document.getElementById('log-date');
            dateInput.value = getTodayDate();

            renderMealSelector();
            updateFacilityTitle();
            switchLocation('House of Woof');
        }

        window.onload = initialize;
    </script>
</body>
</html>
